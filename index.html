<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meine Rezepte 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --warm: #f5e6d0;
    --accent: #c0713a;
    --accent2: #8b4513;
    --green: #5a7a52;
    --text: #2c1a0e;
    --muted: #8a7060;
    --white: #fffdf9;
    --shadow: 0 4px 20px rgba(44,26,14,0.10);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c0713a' fill-opacity='0.04'%3E%3Ccircle cx='20' cy='20' r='2'/%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    padding: 28px 20px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(44,26,14,0.18);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #fffdf9;
    letter-spacing: 0.5px;
  }
  .header p {
    color: rgba(255,253,249,0.75);
    font-size: 0.85rem;
    margin-top: 3px;
    font-weight: 300;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 2px solid var(--warm);
    position: sticky;
    top: 94px;
    z-index: 99;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .tab-btn .icon { font-size: 1.3rem; }
  .tab-btn.active {
    color: var(--accent);
    border-bottom: 3px solid var(--accent);
    margin-bottom: -2px;
    background: var(--cream);
  }

  /* SCREENS */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* CATEGORY CHIPS */
  .category-filter {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
  }
  .category-filter::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap;
    padding: 7px 16px;
    border-radius: 50px;
    border: 2px solid var(--warm);
    background: var(--white);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .chip.active, .chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* RECIPE GRID */
  .recipe-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .recipe-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    gap: 0;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1.5px solid var(--warm);
    position: relative;
  }
  .recipe-card:active { transform: scale(0.98); }

  .recipe-img {
    width: 100px;
    min-height: 110px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--warm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
  }
  .recipe-img img {
    width: 100px;
    height: 100%;
    object-fit: cover;
  }

  .recipe-info {
    padding: 14px 14px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .recipe-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.3;
  }
  .recipe-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 2px;
  }
  .cat-badge {
    background: var(--warm);
    color: var(--accent2);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 50px;
    letter-spacing: 0.3px;
  }
  .recipe-link {
    font-size: 0.78rem;
    color: var(--accent);
    margin-top: 4px;
    text-decoration: none;
    word-break: break-all;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .recipe-link:before { content: "🔗"; font-size: 0.75rem; }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 4rem; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.5; }

  /* ADD FORM */
  .form-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 18px;
    border: 1.5px solid var(--warm);
  }
  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--text);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 7px;
  }
  .field input, .field textarea {
    width: 100%;
    padding: 13px 15px;
    border: 2px solid var(--warm);
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
    background: var(--white);
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 2.5px dashed var(--accent);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    background: var(--cream);
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .img-upload-area:hover { background: var(--warm); }
  .img-upload-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .img-upload-area .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .img-upload-area p { font-size: 0.9rem; color: var(--muted); }
  .img-upload-area strong { color: var(--accent); }

  .preview-img {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 12px;
    margin-top: 10px;
    border: 2px solid var(--warm);
  }

  /* CATEGORY SELECT */
  .cat-select-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .cat-toggle {
    padding: 8px 14px;
    border-radius: 50px;
    border: 2px solid var(--warm);
    background: var(--cream);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .cat-toggle.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Lato', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  .btn-secondary {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-secondary:active { background: var(--warm); }

  /* CATEGORIES SCREEN */
  .section-label {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .cat-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .cat-item {
    background: var(--white);
    border-radius: 14px;
    padding: 15px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1.5px solid var(--warm);
    box-shadow: var(--shadow);
  }
  .cat-item-name {
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cat-item-count {
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--warm);
    padding: 3px 9px;
    border-radius: 50px;
    font-weight: 700;
  }
  .cat-delete {
    background: none;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
  }

  /* ADD CATEGORY */
  .add-cat-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-cat-row input {
    flex: 1;
    padding: 13px 15px;
    border: 2px solid var(--warm);
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    outline: none;
  }
  .add-cat-row input:focus { border-color: var(--accent); }
  .add-cat-row button {
    padding: 13px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.3rem;
    cursor: pointer;
  }

  /* EMOJI PICKER */
  .emoji-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .emoji-btn {
    font-size: 1.4rem;
    padding: 4px 6px;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    background: var(--warm);
    transition: all 0.15s;
  }
  .emoji-btn.selected, .emoji-btn:hover { border-color: var(--accent); background: var(--cream); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent2);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,26,14,0.55);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 430px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 20px 36px;
    box-shadow: 0 -4px 30px rgba(44,26,14,0.18);
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--warm);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 16px;
    margin-bottom: 14px;
  }
  .modal-emoji {
    text-align: center;
    font-size: 4rem;
    margin-bottom: 8px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 10px;
  }
  .modal-notes {
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .modal-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 18px;
    background: var(--accent);
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.92rem;
    margin-top: 6px;
  }

  /* COUNT BADGE */
  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 50px;
    padding: 0 5px;
    margin-left: 6px;
  }

  hr { border: none; border-top: 1.5px solid var(--warm); margin: 18px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🍽️ Meine Rezepte</h1>
  <p id="recipeCountHeader">Deine persönliche Rezeptsammlung</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('rezepte')">
    <span class="icon">📖</span>Rezepte
  </button>
  <button class="tab-btn" onclick="showTab('hinzufuegen')">
    <span class="icon">➕</span>Hinzufügen
  </button>
  <button class="tab-btn" onclick="showTab('kategorien')">
    <span class="icon">🏷️</span>Kategorien
  </button>
</div>

<!-- ========== REZEPTE SCREEN ========== -->
<div id="screen-rezepte" class="screen active">
  <div class="category-filter" id="categoryFilter"></div>
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="emoji">🥘</div>
    <h3>Noch keine Rezepte</h3>
    <p>Tippe auf „Hinzufügen" um dein erstes Rezept einzutragen!</p>
  </div>
</div>

<!-- ========== HINZUFÜGEN SCREEN ========== -->
<div id="screen-hinzufuegen" class="screen">
  <div class="form-card">
    <div class="form-title">✨ Neues Rezept</div>

    <div class="field">
      <label>📝 Name des Rezepts *</label>
      <input type="text" id="recipeName" placeholder="z.B. Mamas Apfelkuchen">
    </div>

    <div class="field">
      <label>📸 Foto (optional)</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" accept="image/*" id="imageInput" onchange="handleImage(event)">
        <div class="upload-icon">📷</div>
        <p><strong>Foto antippen</strong><br>oder aus Galerie wählen</p>
      </div>
      <img id="imagePreview" class="preview-img" style="display:none">
    </div>

    <div class="field">
      <label>🔗 Link zum Rezept (optional)</label>
      <input type="url" id="recipeLink" placeholder="https://www.chefkoch.de/...">
    </div>

    <div class="field">
      <label>📋 Notizen (optional)</label>
      <textarea id="recipeNotes" placeholder="z.B. Zucker halbieren, ohne Nüsse..."></textarea>
    </div>

    <div class="field">
      <label>🏷️ Kategorien wählen</label>
      <div class="cat-select-grid" id="catSelectGrid"></div>
    </div>

    <button class="btn-primary" onclick="saveRecipe()">💾 Rezept speichern</button>
    <button class="btn-secondary" onclick="clearForm()">✖ Formular leeren</button>
  </div>
</div>

<!-- ========== KATEGORIEN SCREEN ========== -->
<div id="screen-kategorien" class="screen">
  <div class="form-card" style="margin-bottom:16px">
    <div class="form-title">🏷️ Neue Kategorie</div>
    <div class="field" style="margin-bottom:10px">
      <label>Emoji wählen</label>
      <div class="emoji-row" id="emojiRow"></div>
    </div>
    <div class="add-cat-row">
      <input type="text" id="newCatName" placeholder="z.B. Vegetarisch, Schnell...">
      <button onclick="addCategory()">＋</button>
    </div>
  </div>

  <p class="section-label">Alle Kategorien</p>
  <div class="cat-list" id="catList"></div>
</div>

<!-- RECIPE DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const DEFAULT_CATS = [
  { id: 'proteinreich', name: 'Proteinreich', emoji: '💪' },
  { id: 'backen',       name: 'Backen',       emoji: '🧁' },
  { id: 'kochen',       name: 'Kochen',       emoji: '🍳' },
  { id: 'schnell',      name: 'Schnell',      emoji: '⚡' },
  { id: 'suppe',        name: 'Suppe',        emoji: '🍲' },
  { id: 'salat',        name: 'Salat',        emoji: '🥗' },
  { id: 'dessert',      name: 'Dessert',      emoji: '🍰' },
  { id: 'vegetarisch',  name: 'Vegetarisch',  emoji: '🥦' },
];

const EMOJIS = ['🍕','🍝','🥩','🥦','🍰','🧁','🥗','🍲','🐟','🍳','🥘','🫕','🥐','🍜','🍛','🥙','🧆','🥚','🍖','🌮'];

let categories = JSON.parse(localStorage.getItem('cats') || 'null') || DEFAULT_CATS;
let recipes    = JSON.parse(localStorage.getItem('recipes') || '[]');
let imageData  = null;
let selectedEmoji = '🍽️';
let activeFilter = 'all';
let selectedCats = [];

function save() {
  localStorage.setItem('cats',    JSON.stringify(categories));
  localStorage.setItem('recipes', JSON.stringify(recipes));
}

// ===== TABS =====
function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'rezepte') renderRecipes();
  if (name === 'kategorien') renderCategories();
  if (name === 'hinzufuegen') renderCatSelect();
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ===== IMAGE =====
function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageData = ev.target.result;
    const prev = document.getElementById('imagePreview');
    prev.src = imageData;
    prev.style.display = 'block';
    document.querySelector('.img-upload-area p').innerHTML = '<strong>✅ Foto gewählt!</strong><br>Antippen zum Ändern';
  };
  reader.readAsDataURL(file);
}

// ===== CATEGORY SELECT (in form) =====
function renderCatSelect() {
  const grid = document.getElementById('catSelectGrid');
  selectedCats = [];
  grid.innerHTML = categories.map(c => `
    <button class="cat-toggle" id="ct_${c.id}" onclick="toggleCat('${c.id}')">
      ${c.emoji} ${c.name}
    </button>
  `).join('');
}

function toggleCat(id) {
  const btn = document.getElementById('ct_' + id);
  if (selectedCats.includes(id)) {
    selectedCats = selectedCats.filter(x => x !== id);
    btn.classList.remove('selected');
  } else {
    selectedCats.push(id);
    btn.classList.add('selected');
  }
}

// ===== SAVE RECIPE =====
function saveRecipe() {
  const name = document.getElementById('recipeName').value.trim();
  if (!name) { toast('❗ Bitte einen Namen eingeben!'); return; }

  const recipe = {
    id: Date.now().toString(),
    name,
    link:  document.getElementById('recipeLink').value.trim(),
    notes: document.getElementById('recipeNotes').value.trim(),
    image: imageData,
    cats:  [...selectedCats],
    date:  new Date().toLocaleDateString('de-DE')
  };

  recipes.unshift(recipe);
  save();
  clearForm();
  toast('✅ Rezept gespeichert!');
  updateHeader();

  // Switch to Rezepte tab
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-rezepte').classList.add('active');
  document.querySelector('.tab-btn').classList.add('active');
  renderRecipes();
}

function clearForm() {
  document.getElementById('recipeName').value  = '';
  document.getElementById('recipeLink').value  = '';
  document.getElementById('recipeNotes').value = '';
  imageData = null;
  document.getElementById('imagePreview').style.display = 'none';
  document.querySelector('.img-upload-area p').innerHTML = '<strong>Foto antippen</strong><br>oder aus Galerie wählen';
  document.getElementById('imageInput').value = '';
  renderCatSelect();
}

// ===== RECIPES =====
function renderRecipes() {
  updateHeader();
  renderFilterChips();
  const grid = document.getElementById('recipeGrid');
  const empty = document.getElementById('emptyState');

  let filtered = activeFilter === 'all'
    ? recipes
    : recipes.filter(r => r.cats && r.cats.includes(activeFilter));

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    if (recipes.length > 0 && activeFilter !== 'all') {
      empty.querySelector('h3').textContent = 'Keine Rezepte hier';
      empty.querySelector('p').textContent = 'In dieser Kategorie sind noch keine Rezepte.';
    } else {
      empty.querySelector('h3').textContent = 'Noch keine Rezepte';
      empty.querySelector('p').textContent = 'Tippe auf „Hinzufügen" um dein erstes Rezept einzutragen!';
    }
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(r => {
    const cats = (r.cats || []).map(cid => {
      const cat = categories.find(c => c.id === cid);
      return cat ? `<span class="cat-badge">${cat.emoji} ${cat.name}</span>` : '';
    }).join('');

    const imgSection = r.image
      ? `<div class="recipe-img"><img src="${r.image}" alt="${r.name}"></div>`
      : `<div class="recipe-img">🍽️</div>`;

    return `
      <div class="recipe-card" onclick="openRecipe('${r.id}')">
        ${imgSection}
        <div class="recipe-info">
          <div class="recipe-title">${r.name}</div>
          <div class="recipe-cats">${cats}</div>
          ${r.link ? `<span class="recipe-link">${r.link.replace(/^https?:\/\//, '').substring(0,35)}…</span>` : ''}
        </div>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteRecipe('${r.id}')">🗑️</button>
      </div>`;
  }).join('');
}

function renderFilterChips() {
  const div = document.getElementById('categoryFilter');
  const usedCatIds = [...new Set(recipes.flatMap(r => r.cats || []))];
  const usedCats = categories.filter(c => usedCatIds.includes(c.id));

  div.innerHTML = `<button class="chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">🍽️ Alle</button>` +
    usedCats.map(c =>
      `<button class="chip ${activeFilter===c.id?'active':''}" onclick="setFilter('${c.id}')">${c.emoji} ${c.name}</button>`
    ).join('');
}

function setFilter(id) {
  activeFilter = id;
  renderRecipes();
}

function deleteRecipe(id) {
  if (!confirm('Rezept löschen?')) return;
  recipes = recipes.filter(r => r.id !== id);
  save();
  renderRecipes();
  toast('🗑️ Gelöscht');
}

function updateHeader() {
  document.getElementById('recipeCountHeader').textContent =
    recipes.length === 0 ? 'Deine persönliche Rezeptsammlung' :
    recipes.length === 1 ? '1 Rezept gespeichert' :
    `${recipes.length} Rezepte gespeichert`;
}

// ===== MODAL =====
function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  const cats = (r.cats || []).map(cid => {
    const cat = categories.find(c => c.id === cid);
    return cat ? `<span class="cat-badge">${cat.emoji} ${cat.name}</span>` : '';
  }).join('');

  let html = '';
  if (r.image) {
    html += `<img src="${r.image}" class="modal-img" alt="${r.name}">`;
  } else {
    html += `<div class="modal-emoji">🍽️</div>`;
  }
  html += `<div class="modal-title">${r.name}</div>`;
  html += `<div class="recipe-cats" style="margin-bottom:12px">${cats}</div>`;
  if (r.notes) html += `<div class="modal-notes">${r.notes}</div>`;
  if (r.link) html += `<a href="${r.link}" target="_blank" class="modal-link">🔗 Zum Rezept öffnen</a>`;

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ===== CATEGORIES SCREEN =====
function renderCategories() {
  // Emoji picker
  const emojiRow = document.getElementById('emojiRow');
  emojiRow.innerHTML = EMOJIS.map(em =>
    `<button class="emoji-btn ${selectedEmoji===em?'selected':''}" onclick="selectEmoji('${em}')">${em}</button>`
  ).join('');

  // List
  const list = document.getElementById('catList');
  if (categories.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px">Noch keine Kategorien</p>';
    return;
  }
  list.innerHTML = categories.map(c => {
    const count = recipes.filter(r => r.cats && r.cats.includes(c.id)).length;
    const isDefault = DEFAULT_CATS.some(d => d.id === c.id);
    return `
      <div class="cat-item">
        <div class="cat-item-name">${c.emoji} ${c.name}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cat-item-count">${count} Rezept${count!==1?'e':''}</span>
          ${!isDefault ? `<button class="cat-delete" onclick="deleteCategory('${c.id}')">🗑️</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

function selectEmoji(em) {
  selectedEmoji = em;
  renderCategories();
}

function addCategory() {
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if (!name) { toast('❗ Bitte einen Namen eingeben!'); return; }
  if (categories.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    toast('❗ Kategorie existiert bereits'); return;
  }
  const id = 'cat_' + Date.now();
  categories.push({ id, name, emoji: selectedEmoji });
  input.value = '';
  save();
  renderCategories();
  toast(`✅ „${name}" hinzugefügt!`);
}

function deleteCategory(id) {
  if (!confirm('Kategorie löschen?')) return;
  categories = categories.filter(c => c.id !== id);
  recipes.forEach(r => { r.cats = (r.cats || []).filter(cid => cid !== id); });
  save();
  renderCategories();
  toast('🗑️ Kategorie gelöscht');
}

// ===== INIT =====
renderRecipes();
renderCatSelect();
</script>
</body>
</html>
